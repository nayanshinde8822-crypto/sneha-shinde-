<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif; 
        }

        .login-box {
            width: 270px;
            padding: 25px;
            background: #111;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .login-box h2 {
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin: 15px 0;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
        }

        .input-group i {
            color: #00aaff;
            margin-right: 10px;
            font-size: 16px;
        }

        .input-group input {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: white;
            outline: none;
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: white;
            color: black;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2> SIGN IN</h2>

        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Username">
        </div>

        <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" placeholder="Email">
        </div>

        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <button class="btn"> SIGN IN</button>
    </div>

</body>

</html>
