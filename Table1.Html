<!DOCTYPE html>
<html>
<head>
    <title>Employee Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

 <h2>Employee Details</h2>

 <table>
     <tr>
         <th>Field</th>
         <th>Value</th>
    </tr>
   <tr>
         <td>Emp No</td>
         <td id="empno"></td>
     </tr>
        <tr>
            <td>Name</td>
            <td id="empname"></td>
    </tr>
        <tr>
        <td>Timing</td>
        <td id="timing"></td>
        </tr>
    </table>

    <script>
       var empno = 100;
        var empname = "sneha ";
        var timing = "10:30 AM";

         document.getElementById("empno").innerHTML = empno;
        document.getElementById("empname").innerHTML = empname;
         document.getElementById("timing").innerHTML = timing;
      
    </script>
       <msg class="innerHT">= Hello sneha</msg>

</body>
</html>
