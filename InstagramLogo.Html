<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Logo</title>
<style>
body {
    display: flex;
     justify-content: center;
    align-items: center;
     height: 100vh;
    background: #f5f5f5;
     margin: 0;
}

.instagram-logo {
    width: 250px;
    height: 250px;
    background: linear-gradient(
        45deg,
        #feda75,
        #fa7e1e,
        #d62976,
        #962fbf,
        #4f5bd5
    );
    border-radius: 60px;
    position: relative;
}

.instagram-logo::before {
    content: "";
    position: absolute;
    top: 35px;
    left: 35px;
    width: 180px;
    height: 180px;
    border: 12px solid white;
    border-radius: 50px;
}

.instagram-logo::after {
    content: "";
    position: absolute;
    top: 85px;
    left: 85px;
    width: 80px;
    height: 80px;
    border: 12px solid white;
    border-radius: 50%;
}

.camera-dot {
    position: absolute;
    top: 65px;
    right: 65px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
}
</style>
</head>
<body>

<div class="instagram-logo">
    <div class="camera-dot"></div>
</div>

</body>
</html>
