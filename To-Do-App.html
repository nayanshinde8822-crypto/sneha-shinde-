<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        #taskInput {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            padding: 5px;
        }
    </style>
</head>

<body>

    <h1>📝 To-Do App</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let task = input.value;

            if (task === "") {
                alert("Please enter a task!");
                return;
            }

            let li = document.createElement("li");
            li.innerText = task;

            let btn = document.createElement("button");
            btn.innerText = "Delete";
            btn.className = "delete";

            btn.onclick = function () {
                li.remove();
            };

            li.appendChild(btn);
            document.getElementById("taskList").appendChild(li);

            input.value = "";
        }
    </script>
