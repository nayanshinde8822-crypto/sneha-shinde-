<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 500px;
            width: 500px;
            background-color: aqua;
            transition-duration: 2s;
            transition-timing-function: ease
        }
        div:hover{
            background-color: red;
            border-radius: 50%;
        }
        button{
            height: 100px;
            width: 200px;
            border-radius: 20px;
            border-color: aqua;
        }
        button:hover{
            background-color: aqua;
            
        }
        
        a:link{
            color: yellow;
        }
    </style>
</head>
<body>
    <div></div>
    <br><br>
    <button>submit</button>
    <br><br>
    <a href="#www.amazon.com">Amazon</a>
</body>
</html>
