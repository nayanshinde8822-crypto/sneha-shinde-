<!DOCTYPE html>
<html lang="en">
 <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login With OTP Verification</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    color:#333;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0056b3;
}

#timer{
    color:red;
    font-weight:bold;
}

#msg{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <h2>Login Form</h2>

     <input type="text" id="user" placeholder="Enter Username">

    <input type="password" id="pass" placeholder="Enter Password">

     <input type="tel" id="phno" placeholder="Enter Phone Number">

    <input type="email" id="email" placeholder="Enter Email">

     <button onclick="checkLogin()">Login</button>

    <div id="otpSection" style="display:none;">
        <input type="text" id="otpInput" placeholder="Enter OTP">
         <br>

         <button onclick="verifyOTP()">Verify OTP</button>

          <p id="timer"></p>
    </div>

     <h3 id="msg"></h3>

</div>

<script>

 let attempts = 4;
let generatedOTP = "";
 let countdown;

function checkLogin(){

     let username = "sneha";
    let password = "sneha@123";
     let phone = "8767213545";
    let email = "snehashinde4456@gmail.com";

    let a = document.getElementById("user").value;
     let b = document.getElementById("pass").value;
    let c = document.getElementById("phno").value;
     let d = document.getElementById("email").value;

    let msg = document.getElementById("msg");

    if(a===username &&
        b===password &&
       c===phone &&
        d===email){

        generateOTP();

    }else{

        attempts--;

        if(attempts>0){
            msg.innerHTML ="❌ Login Failed. Attempts Left : " + attempts;
             msg.style.color="red";
        }
        else{
            msg.innerHTML ="🚫 Account Locked!";
             msg.style.color="red";
        }
    }
}

function generateOTP(){

    generatedOTP = Math.floor(100000 + Math.random()*900000);

     alert("Your OTP is : " + generatedOTP);

    document.getElementById("otpSection").style.display="block";

    document.getElementById("msg").innerHTML ="OTP Sent Successfully";

    startTimer();
}

function startTimer(){

    let timeLeft = 60;

     let timer = document.getElementById("timer");

    clearInterval(countdown);

     countdown = setInterval(function(){

        timer.innerHTML = "OTP expires in : " + timeLeft + " sec";

        timeLeft--;

        if(timeLeft < 0){

            clearInterval(countdown);

              generatedOTP = "";

            timer.innerHTML = "OTP Expired! Generate Login Again.";
        }

    },1000);
}

function verifyOTP(){

    let enteredOTP =document.getElementById("otpInput").value;

     let msg = document.getElementById("msg");

    if(enteredOTP == generatedOTP && generatedOTP !== ""){
 
        clearInterval(countdown);

        msg.innerHTML ="✅ Login Successful";
         msg.style.color="green";
    }
    else{
        msg.innerHTML =  "❌ Invalid OTP";
          msg.style.color="red";
    }
}

</script>

</body>
</html>
