<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmazonLite</title>
</head>

<body>
    <h1>AmazonLite</h1>

    <label>Enter product price</label>
    <input type="number" id="price">
    <br><br>

    <label>Enter product quantity</label>
    <input type="number" id="qn">
    <br><br>

    <button onclick="getbill()">Calculate Bill</button>
    <button onclick="applyDiscount(10)">Apply 10% Discount</button>
    <button onclick="applyDiscount(20)">Apply 20% Discount</button>
    <button onclick="applyDiscount(30)">Apply 30% Discount</button>

    <h2 id="result"></h2>

    <script>
        var price = document.getElementById("price");
        var qn = document.getElementById("qn");
        var result = document.getElementById("result");

        let totalbill = 0;

        function getbill() {
            let p = Number(price.value);
            let q = Number(qn.value);

            if (p <= 0 || q <= 0) {
                result.innerHTML = "Please enter valid values!";
                return;
            }

            totalbill = p * q;
            result.innerHTML = "Total Bill = ₹ " + totalbill;
        }

        function applyDiscount(percent) {
            if (totalbill === 0) {
                result.innerHTML = "First calculate bill!";
                return;
            }

            let discount = totalbill * percent / 100;
            let finalAmount = totalbill - discount;

            result.innerHTML =
                "Total Bill = ₹ " + totalbill + "<br>" +
                "Discount (" + percent + "%) = ₹ " + discount + "<br>" +
                "Final Amount = ₹ " + finalAmount;
        }
    </script>

</body>

</html>
