<!DOCTYPE html>
<html>
<head>
    <title>Flipkart Login</title>
    <style>
        body{
            background:#f1f3f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .container{
            width:800px;
            height:450px;
            display:flex;
            box-shadow:0 0 10px gray;
            background:white;
        }

        .left{
            width:35%;
            background:#2874f0;
            color:white;
            padding:40px 30px;
        }

        .left h1{
            font-size:30px;
        }

        .left p{
            font-size:18px;
            color:#dbdbdb;
        }

        .right{
            width:65%;
            padding:50px;
        }

        input{
            width:100%;
            border:none;
            border-bottom:1px solid #999;
            padding:10px;
            font-size:16px;
            outline:none;
        }

        button{
            width:100%;
            background:#fb641b;
            color:white;
            border:none;
            padding:15px;
            margin-top:30px;
            font-size:16px;
            cursor:pointer;
        }

        .signup{
            text-align:center;
            margin-top:150px;
            color:#2874f0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>Login</h1>
        <p>Get access to your Orders,<br>Wishlist and Recommendations</p>
    </div>

    <div class="right">
        <input type="text" placeholder="Enter Email/Mobile Number">
        <br><br>
        <button>Request OTP</button>

        <div class="signup">
            New to Flipkart? Create an account
        </div>
    </div>
</div>

</body>
</html>
