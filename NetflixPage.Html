<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#000;
     color:white;
}

.hero{
    height:100vh;
     background:
        linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
          url ('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');
    background-size:cover;
     background-position:center;
}

nav{
    display:flex;
     justify-content:space-between;
    align-items:center;
     padding:20px 60px;
}

.logo{
    color:#e50914;
     font-size:40px;
    font-weight:bold;
}

.signin{
    background:#e50914;
     color:white;
    border:none;
     padding:10px 18px;
    border-radius:4px;
     cursor:pointer;
}

.content{
    height:80vh;
     display:flex;
    flex-direction:column;
     justify-content:center;
    align-items:center;
     text-align:center;
}

.content h1{
    font-size:60px;
     max-width:700px;
    margin-bottom:20px;
}

.content h3{
    font-size:24px;
     margin-bottom:20px;
}

.content p{
    margin-bottom:20px;
}

.form{
    display:flex;
      gap:10px;
}

.form input{
    width:350px;
     padding:15px;
    border:none;
     outline:none;
    font-size:16px;
}

.form button{
    background:#e50914;
     color:white;
    border:none;
     padding:15px 25px;
    font-size:18px;
     cursor:pointer;
}
</style>
</head>
<body>

<section class="hero">

    <nav>
        <div class="logo">NETFLIX</div>
         <button class="signin"> Sign In</button>
    </nav>

    <div class="content">
        <h1>Unlimited movies, TV shows and more</h1>

        <h3>Starts at ₹149. Cancel at any time.</h3>

        <p>Ready to watch? Enter your email to create or restart your membership.</p>

        <div class="form">
            <input type="email" placeholder="Email address">
            <button>Get Started ></button>
        </div>
    </div>

</section>

</body>
</html>
